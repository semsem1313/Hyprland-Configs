#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 3
    gaps_out = 10

    border_size = 1
    #uneccesary but u can add float gaps
    #float_gaps = 5

    col.active_border = rgba(121212ee) rgba(e8eaedee) 50deg 
    #45deg is also fine
    col.inactive_border = rgba(595959aa)

    resize_on_border = false

    allow_tearing = false
    layout = master
    #master preferrred over dwindle
    snap {
	enabled = true

    }    
}


decoration {
    rounding = 8
    rounding_power = 4

    # Change transparency of focused and unfocused windows
    active_opacity = 1
    inactive_opacity = 0.95
    fullscreen_opacity = 1
    dim_inactive = false
    border_part_of_window = true
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
	sharp = false
    }
    #THIS IS THE IMP BLUR EFFECT WHICH U WILL SEE FOR EVERY WINDOW
    blur {
        enabled = true
        size = 9
        passes = 2

        vibrancy = 0.1696
    }
}

animations {
    enabled = yes, please :)
    
    #My BEZIER CURVE
    bezier = myBezier,0.05, 0.9, 0.1, 1.05
  
    #MY ANIMATIONS
    animation = windows, 1, 7, myBezier
    animation = windowsIn, 1, 7, myBezier, slide
    animation = windowsOut, 1, 7, myBezier, slide
    animation = border, 1, 10, default
    animation = borderangle, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, myBezier, slidefade 10%
    animation = layersIn, 1, 7, myBezier, popin 75%
    animation = layersOut, 1, 7, myBezier, popin 75%


master {
    new_status = master
}
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


##############
### INPUT ###
#############
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}


gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}
